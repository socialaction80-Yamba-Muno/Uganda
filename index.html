  <div id="dashboard" class="hidden"></div>
  <div id="admin" class="hidden"></div>
  <div id="donorPage" class="hidden"></div>
</main>

<!-- ===== FOOTER ===== -->
<footer class="mt-16 pb-8 text-center px-4">
  <a href="https://wa.me/256780420041" target="_blank" class="inline-flex items-center gap-2 bg-[#25D366] text-white font-bold px-6 py-3 rounded-xl btn-press transition-opacity hover:opacity-90">
    <i class="fab fa-whatsapp text-lg"></i> WhatsApp Support

  <p class="text-gray-400 text-xs mt-4">© 2026 YAMBAMUNO.COM  |  9% Platform Fee  |  All transactions verified by admin</p>

<script>
/* ===================================================
   DATA LAYER
=================================================== */
let users = {}, fundraisers = {}, donations = {}, proofs = {}, stripeNotes = {};
let currentUser = JSON.parse(sessionStorage.getItem('ym_current')) || null;
let creatingNew = false;

const ADMIN_EMAIL   = "admin@yambamuno.com";
const ADMIN_PASS    = "Kalungi123";
const ADMIN_NAME    = "Lubinga Alosious";
const PLATFORM_PCT  = 9;
const MTN_NUMBER    = "+256788417769";
const AIRTEL_NUMBER = "+256743830346";
const STRIPE_LINK   = "https://buy.stripe.com/8x214o2awd8l8ym7PhfjG00";
const DEFAULT_IMG   = "https://i.imgur.com/8Km9tLL.png";
let uploadedImgUrl = DEFAULT_IMG;
let tempPayout     = null;
let isUploading    = false;

function loadData() {
  users        = JSON.parse(localStorage.getItem('ym_users'))        || {};
  fundraisers  = JSON.parse(localStorage.getItem('ym_funds'))        || {};
  donations    = JSON.parse(localStorage.getItem('ym_dons'))         || {};
  proofs       = JSON.parse(localStorage.getItem('ym_proofs'))       || {};
  stripeNotes  = JSON.parse(localStorage.getItem('ym_stripe_notes')) || {};
}
function saveData() {
  localStorage.setItem('ym_users',        JSON.stringify(users));
  localStorage.setItem('ym_funds',        JSON.stringify(fundraisers));
  localStorage.setItem('ym_dons',         JSON.stringify(donations));
  localStorage.setItem('ym_proofs',       JSON.stringify(proofs));
  localStorage.setItem('ym_stripe_notes', JSON.stringify(stripeNotes));
}
function saveSession(user) {
  currentUser = user;
  sessionStorage.setItem('ym_current', JSON.stringify(user));
}
function slugify(text) {
  return text.toString().toLowerCase().replace(/\s+/g,'-').replace(/[^\w\-]+/g,'').substring(0,40);
}
function currency(country) {
  return { KE:'KES', TZ:'TZS', UG:'UGX' }[country] || 'UGX';
}
function updateMeta(title, desc, img, url) {
  ['ogTitle','twTitle'].forEach(id => document.getElementById(id).setAttribute('content', title));
  ['ogDesc','twDesc'].forEach(id   => document.getElementById(id).setAttribute('content', desc));
  ['ogImg','twImg'].forEach(id     => document.getElementById(id).setAttribute('content', img));
  document.getElementById('ogUrl').setAttribute('content', url);
  document.title = title + ' | Yamba Muno';
}
function hideAll() {
  ['home','app','dashboard','admin','donorPage'].forEach(id => document.getElementById(id).classList.add('hidden'));
}
function fmtNum(n) { return Number(n||0).toLocaleString(); }
function ago(ts) {
  const d = Date.now() - ts;
  if (d < 60000)    return 'just now';
  if (d < 3600000)  return Math.floor(d/60000)   + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return Math.floor(d/86400000) + 'd ago';
}

/* ===================================================
   INIT
=================================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadData();
  updateHeaderBtn();
  const slug = new URLSearchParams(window.location.search).get('f');
  if (slug)                         showDonorPage(slug);
  else if (currentUser?.id === 'admin') showAdmin();
  else if (currentUser)             showDashboard();
  else                              showHome();
});

function updateHeaderBtn() {
  const btn = document.getElementById('headerAuthBtn');
  if (!btn) return;
  if (currentUser) {
    btn.innerHTML = '<i class="fa-solid fa-grid-2 text-black text-sm"></i>';
    btn.onclick = () => currentUser.id === 'admin' ? showAdmin() : showDashboard();
    btn.title = 'My Dashboard';
  } else {
    btn.innerHTML = '<i class="fa-solid fa-user text-black text-sm"></i>';
    btn.onclick = showAuthPage;
    btn.title = 'Login / Sign Up';
  }
}

/* ===================================================
   HOME
=================================================== */
window.showHome = function() {
  loadData();
  updateMeta('Yamba Muno – Transparent Fundraising East Africa', 'Support fundraisers in Uganda, Kenya & Tanzania. 100% transparent. 9% platform fee.', DEFAULT_IMG, window.location.origin + window.location.pathname);
  hideAll();
  document.getElementById('home').classList.remove('hidden');
  updateHeaderBtn();

  const allFunds = Object.values(fundraisers).filter(f => f.status === 'approved').sort((a,b) => b.created - a.created);

  const heroHTML = `
    <div class="relative rounded-3xl overflow-hidden mt-6 mb-8 shadow-2xl fade-in">
      <img src="https://images.unsplash.com/photo-1578357078586-491adf1aa5ba?w=1200&q=80" alt="East Africa community fundraising" class="w-full h-56 md:h-72 object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-green/90 via-green/40 to-transparent flex flex-col justify-end p-6">
        <p class="text-gold font-bold text-sm tracking-widest uppercase mb-1">East Africa's Most Trusted Platform</p>
        <h2 class="text-white text-2xl md:text-4xl font-black leading-tight">Give Hope.<br>Change Lives.</h2>
        <p class="text-white/80 text-sm mt-2 max-w-xs">Every donation is verified. Every shilling tracked. Uganda · Kenya · Tanzania.</p>
        ${currentUser
          ? `<button onclick="showDashboard()" class="mt-4 inline-flex items-center gap-2 bg-gold text-black font-bold px-6 py-3 rounded-xl btn-press w-fit"><i class="fa-solid fa-rocket"></i> My Dashboard</button>`
          : `<button onclick="showAuthPage()" class="mt-4 inline-flex items-center gap-2 bg-gold text-black font-bold px-6 py-3 rounded-xl btn-press w-fit"><i class="fa-solid fa-rocket"></i> Start a Fundraiser</button>`
        }
      </div>
    </div>`;

  const statsHTML = `
    <div class="grid grid-cols-3 gap-3 mb-8">
      ${[
        { icon:'fa-hand-holding-heart', label:'Fundraisers', val: Object.values(fundraisers).filter(f=>f.status==='approved').length },
        { icon:'fa-coins',              label:'Total Raised', val: fmtNum(Object.values(fundraisers).reduce((s,f)=>s+(f.raised||0),0)) },
        { icon:'fa-users',              label:'Donors',       val: Object.values(proofs).filter(p=>p.status==='approved').length + Object.values(stripeNotes).filter(s=>s.status==='approved').length }
      ].map(s => `
        <div class="bg-white rounded-2xl p-3 text-center shadow-sm border border-gray-100">
          <i class="fa-solid ${s.icon} text-green text-lg mb-1"></i>
          <p class="text-green font-black text-base leading-none">${s.val}</p>
          <p class="text-gray-400 text-xs mt-0.5">${s.label}</p>
        </div>`).join('')}
    </div>`;

  const fundsHTML = allFunds.length > 0
    ? `<div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        ${allFunds.map(f => {
          const pct = f.target > 0 ? Math.min(100, Math.round((f.raised||0) / f.target * 100)) : 0;
          const link = window.location.origin + window.location.pathname + '?f=' + f.slug;
          const beneficiary = users[f.userId]?.name || 'Beneficiary';
          return `
          <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 card-hover cursor-pointer" onclick="window.location.href='${link}'">
            <div class="relative">
              <img src="${f.media||DEFAULT_IMG}" alt="${f.title}" class="w-full h-44 object-cover" loading="lazy">
              <span class="absolute top-3 left-3 bg-green text-white text-xs font-bold px-3 py-1 rounded-full">${f.country}</span>
            </div>
            <div class="p-4">
              <h3 class="font-bold text-gray-900 text-base leading-snug mb-1">${f.title}</h3>
              <p class="text-gray-400 text-xs mb-3">by ${beneficiary}</p>
              <div class="flex justify-between text-xs mb-1">
                <span class="text-green font-bold">${fmtNum(f.raised||0)} ${f.currency}</span>
                <span class="text-gray-400">${pct}%</span>
              </div>
              <div class="w-full bg-gray-100 rounded-full h-2 mb-3">
                <div class="bg-gradient-to-r from-green to-green-light h-2 rounded-full progress-bar-inner" style="width:${pct}%"></div>
              </div>
              <p class="text-gray-400 text-xs mb-3">Goal: ${fmtNum(f.target)} ${f.currency}</p>
              <button class="w-full bg-gradient-to-r from-gold to-gold-hover text-black font-bold py-2.5 rounded-xl btn-press text-sm">
                <i class="fa-solid fa-heart mr-1"></i> Donate Now
              </button>
            </div>
          </div>`;
        }).join('')}
      </div>`
    : `<div class="bg-white rounded-2xl p-8 text-center shadow-sm border border-gray-100">
        <i class="fa-solid fa-seedling text-green text-4xl mb-4"></i>
        <h3 class="font-bold text-gray-700 text-lg">No Active Fundraisers Yet</h3>
        <p class="text-gray-400 text-sm mt-1">Be the first to start one.</p>
        <button onclick="showAuthPage()" class="mt-4 bg-green text-white font-bold px-6 py-3 rounded-xl btn-press">Start Fundraiser</button>
      </div>`;

  document.getElementById('home').innerHTML = `
    <div class="fade-in">
      ${heroHTML}
      ${statsHTML}
      <h2 class="text-green font-black text-xl mb-4"><i class="fa-solid fa-fire-flame-curved text-gold mr-2"></i>Active Fundraisers</h2>
      ${fundsHTML}
    </div>`;
};

/* ===================================================
   AUTH PAGE
=================================================== */
window.showAuthPage = function() {
  hideAll();
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('app').innerHTML = `
  <div class="fade-in pt-6">
    <div id="authTabs" class="flex bg-white rounded-2xl p-1 shadow-sm border border-gray-100 mb-6">
      <button id="tab_signup" onclick="switchTab('signup')" class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all bg-green text-white">Create Account</button>
      <button id="tab_login"  onclick="switchTab('login')"  class="flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-gray-500">Login</button>
    </div>
    <div id="signupForm" class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-green-pale rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-user-plus text-green text-2xl"></i>
        </div>
        <h2 class="text-xl font-black text-gray-900">Start Fundraising</h2>
        <p class="text-gray-400 text-sm">Create your free account in 30 seconds</p>
      </div>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Full Names</label>
      <input id="authName" placeholder="e.g. John Kamau" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3 transition-all">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Country</label>
      <select id="authCountry" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3 transition-all">
        <option value="UG">🇺🇬 Uganda</option>
        <option value="KE">🇰🇪 Kenya</option>
        <option value="TZ">🇹🇿 Tanzania</option>
      </select>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Phone Number</label>
      <input id="authPhone" placeholder="e.g. 0700123456" inputmode="tel" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3 transition-all">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Create Password</label>
      <div class="relative mb-4">
        <input id="authPass" type="password" placeholder="Min. 6 characters" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm transition-all pr-10">
        <button onclick="togglePass('authPass')" class="absolute right-3 top-3 text-gray-400"><i class="fa-solid fa-eye text-sm"></i></button>
      </div>
      <button onclick="signup()" class="w-full bg-green hover:bg-green-light text-white font-bold py-4 rounded-xl btn-press transition-colors text-sm">
        <i class="fa-solid fa-rocket mr-2"></i>Create Account & Continue
      </button>
    </div>
    <div id="loginForm" class="hidden bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-green-pale rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fa-solid fa-lock text-green text-2xl"></i>
        </div>
        <h2 class="text-xl font-black text-gray-900">Welcome Back</h2>
        <p class="text-gray-400 text-sm">Login to manage your fundraiser</p>
      </div>
      <label class="block text-xs font-semibold text-gray-600 mb-1">Phone Number</label>
      <input id="loginPhone" placeholder="e.g. 0700123456" inputmode="tel" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm mb-3 transition-all">
      <label class="block text-xs font-semibold text-gray-600 mb-1">Password</label>
      <div class="relative mb-4">
        <input id="loginPass" type="password" placeholder="Your password" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm transition-all pr-10">
        <button onclick="togglePass('loginPass')" class="absolute right-3 top-3 text-gray-400"><i class="fa-solid fa-eye text-sm"></i></button>
      </div>
      <button onclick="login()" class="w-full bg-green hover:bg-green-light text-white font-bold py-4 rounded-xl btn-press transition-colors text-sm">
        <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i>Login
      </button>
    </div>
    <button onclick="showHome()" class="w-full mt-3 py-3 text-gray-400 text-sm">← Back to Home</button>
  </div>`;
};

function switchTab(tab) {
  if (tab === 'signup') {
    document.getElementById('signupForm').classList.remove('hidden');
    document.getElementById('loginForm').classList.add('hidden');
    document.getElementById('tab_signup').className = 'flex-1 py-2.5 rounded-xl font-bold text-sm transition-all bg-green text-white';
    document.getElementById('tab_login').className  = 'flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-gray-500';
  } else {
    document.getElementById('signupForm').classList.add('hidden');
    document.getElementById('loginForm').classList.remove('hidden');
    document.getElementById('tab_signup').className = 'flex-1 py-2.5 rounded-xl font-bold text-sm transition-all text-gray-500';
    document.getElementById('tab_login').className  = 'flex-1 py-2.5 rounded-xl font-bold text-sm transition-all bg-green text-white';
  }
}
function togglePass(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

window.signup = function() {
  const name    = document.getElementById('authName').value.trim();
  const country = document.getElementById('authCountry').value;
  const phone   = document.getElementById('authPhone').value.trim();
  const pass    = document.getElementById('authPass').value;
  if (!name || !phone || !pass) return showToast('Please fill in all fields', 'error');
  if (pass.length < 6) return showToast('Password must be at least 6 characters', 'error');
  const existing = Object.values(users).find(u => u.phone === phone);
  if (existing) return showToast('Account with this phone already exists. Please login.', 'error');
  const id = Date.now().toString();
  users[id] = { id, name, phone, country, pass };
  saveData();
  saveSession(users[id]);
  updateHeaderBtn();
  showToast('Account created! Welcome ' + name);
  showDashboard();
};

window.login = function() {
  const phone = document.getElementById('loginPhone').value.trim();
  const pass  = document.getElementById('loginPass').value;
  const user  = Object.values(users).find(u => u.phone === phone && u.pass === pass);
  if (!user) return showToast('Wrong phone or password', 'error');
  saveSession(user);
  updateHeaderBtn();
  showToast('Welcome back, ' + user.name);
  showDashboard();
};

window.showAdminLogin = function() {
  const e = prompt('Admin Email:');
  if (!e) return;
  const p = prompt('Password:');
  if (e === ADMIN_EMAIL && p === ADMIN_PASS) {
    saveSession({ name: ADMIN_NAME, id: 'admin' });
    updateHeaderBtn();
    showAdmin();
  } else {
    showToast('Incorrect admin credentials', 'error');
  }
};

window.logout = function() {
  currentUser = null;
  sessionStorage.removeItem('ym_current');
  updateHeaderBtn();
  showHome();
};

/* ===================================================
   DASHBOARD
=================================================== */
window.showDashboard = function() {
  if (!currentUser || currentUser.id === 'admin') { showHome(); return; }
  loadData();
  hideAll();
  document.getElementById('dashboard').classList.remove('hidden');

  const myFunds = Object.values(fundraisers).filter(f => f.userId === currentUser.id);
  let contentHTML = '';

  if (myFunds.length > 0 && !creatingNew) {
    contentHTML = myFunds.map(f => {
      const raised   = f.raised || 0;
      const fee      = Math.round(raised * PLATFORM_PCT / 100);
      const net      = raised - fee;
      const pct      = f.target > 0 ? Math.min(100, Math.round(raised / f.target * 100)) : 0;
      const link     = window.location.origin + window.location.pathname + '?f=' + f.slug;
      const pending  = Object.values(proofs).filter(p => p.fundId === f.id && p.status === 'pending').length
                     + Object.values(stripeNotes).filter(s => s.fundId === f.id && s.status === 'pending').length;

      const statusBadge = f.status === 'approved'
        ? `<span class="bg-green-pale text-green text-xs font-bold px-3 py-1 rounded-full">✓ Live</span>`
        : `<span class="bg-yellow-100 text-yellow-700 text-xs font-bold px-3 py-1 rounded-full">⏳ Pending Review</span>`;

      return `
      <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 mb-5">
        <img src="${f.media||DEFAULT_IMG}" alt="${f.title}" class="w-full h-48 object-cover" loading="lazy">
        <div class="p-5">
          <div class="flex items-start justify-between mb-3">
            <div>
              <h3 class="font-black text-gray-900 text-lg leading-tight">${f.title}</h3>
              <p class="text-gray-400 text-xs mt-0.5">${f.country} · ${f.currency}</p>
            </div>
            ${statusBadge}
          </div>
          <div class="flex justify-between text-xs mb-1">
            <span class="text-green font-bold">${fmtNum(raised)} ${f.currency} raised</span>
            <span class="text-gray-400">${pct}%</span>
          </div>
          <div class="w-full bg-gray-100 rounded-full h-2.5 mb-4">
            <div class="bg-gradient-to-r from-green to-green-light h-2.5 rounded-full" style="width:${pct}%"></div>
          </div>
          <div class="grid grid-cols-3 gap-3 mb-4">
            ${[

window.previewImage = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const rd = new FileReader();
  rd.onload = ev => {
    const img = document.getElementById('previewImg');
    img.src = ev.target.result;
    img.classList.remove('hidden');
  };
  rd.readAsDataURL(file);
  const status = document.getElementById('uploadStatus');
  const btn    = document.getElementById('launchBtn');
  status.textContent = '⏳ Processing image...';
  btn.disabled = true; btn.classList.add('opacity-60');
  isUploading = true;
  uploadedImgUrl = await compressToBase64(file);
  isUploading = false;
  status.textContent = uploadedImgUrl !== DEFAULT_IMG ? '✅ Photo ready ✓' : '⚠️ Could not load image – default will be used';
  btn.disabled = false; btn.classList.remove('opacity-60');
};

function compressToBase64(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 900;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.78));
      };
      img.onerror = () => resolve(DEFAULT_IMG);
      img.src = e.target.result;
    };
    reader.onerror = () => resolve(DEFAULT_IMG);
    reader.readAsDataURL(file);
  });
}

window.submitPayoutToAdmin = function() {
  const type = document.getElementById('payoutType').value;
  if (!type) return showToast('Select a payout method first', 'error');
  let pd = {};
  if (type === 'Bank') {
    const bn = document.getElementById('bankName')?.value;
    const ba = document.getElementById('bankAccount')?.value;
    const bh = document.getElementById('bankHolder')?.value;
    if (!bn||!ba||!bh) return showToast('Fill all bank fields', 'error');
    pd = { type:'Bank', bankName:bn, bankAccount:ba, bankHolder:bh, bankSwift:document.getElementById('bankSwift')?.value||'' };
  } else {
    const prov = document.getElementById('mmProvider')?.value;
    const num  = document.getElementById('payoutNumber')?.value;
    const nm   = document.getElementById('payoutNames')?.value;
    if (!prov||!num||!nm) return showToast('Fill all mobile money fields', 'error');
    pd = { type:'Mobile', provider:prov, number:num, names:nm };
  }
  tempPayout = pd;
  document.getElementById('payoutStatus').classList.remove('hidden');
  showToast('Payout info saved for admin ✓');
};

window.createNewFundraiser = function() { creatingNew = true; showDashboard(); };

window.launchFundraiser = function() {
  if (isUploading) return showToast('Please wait for image to finish uploading', 'error');
  const title   = document.getElementById('fundTitle')?.value.trim();
  const target  = document.getElementById('fundTarget')?.value;
  const story   = document.getElementById('fundStory')?.value.trim();
  const country = document.getElementById('fundCountry')?.value || 'UG';
  const agreed  = document.getElementById('agreeTerms')?.checked;
  if (!title || !target) return showToast('Fundraiser title and amount are required', 'error');
  if (!story)             return showToast('Please tell your story', 'error');
  if (!tempPayout)        return showToast('Please submit your payout info first', 'error');
  if (!agreed)            return showToast('Please agree to terms to continue', 'error');
  const id   = Date.now().toString();
  const slug = slugify(title) + '-' + id.slice(-4);
  const cur  = currency(country);
  fundraisers[id] = { id, userId:currentUser.id, title, slug, country, currency:cur, target:+target, story, media:uploadedImgUrl, payout:tempPayout, status:'approved', raised:0, created:Date.now() };
  saveData();
  tempPayout = null;
  creatingNew = false;
  showToast('🎉 Fundraiser launched!');
  showDashboard();
};

/* Toggle payment method accordion */
window.toggleMethod = function(method) {
  const methods = ['mtn', 'airtel', 'stripe'];
  methods.forEach(m => {
    const panel   = document.getElementById(m + 'Method');
    const chevron = document.getElementById(m + 'Chevron');
    if (m === method) {
      const isOpen = !panel.classList.contains('hidden');
      if (isOpen) {
        panel.classList.add('hidden');
        chevron?.classList.remove('open');
      } else {
        panel.classList.remove('hidden');
        chevron?.classList.add('open');
      }
    } else {
      panel?.classList.add('hidden');
      chevron?.classList.remove('open');
    }
  });
};

/* Anonymous toggle */
window.toggleAnon = function(prefix) {
  const isAnon = document.getElementById(prefix + 'Anon')?.checked;
  const nameEl = prefix === 'stripe'
    ? document.getElementById('stripeDonorName')
    : document.getElementById(prefix + 'DonorName');
  if (!nameEl) return;
  if (isAnon) { nameEl.value = 'Anonymous'; nameEl.disabled = true; }
  else        { if (nameEl.value === 'Anonymous') nameEl.value = ''; nameEl.disabled = false; }
};

/* ── Mobile Money Proof (MTN / Airtel) ── */
window.submitMobileProof = function(fundId, network) {
  const nameEl   = document.getElementById(network + 'DonorName');
  const phoneEl  = document.getElementById(network + 'DonorPhone');
  const proofEl  = document.getElementById(network + 'ProofText');
  const statusEl = document.getElementById(network + 'ProofStatus');
  const name     = nameEl?.value.trim();
  const phone    = phoneEl?.value.trim();
  const proof    = proofEl?.value.trim();

  if (!name)            return showToast('Please enter your name', 'error');
  if (!proof)           return showToast('Please paste your telecom confirmation SMS', 'error');
  if (proof.length < 20) return showToast('Message too short. Paste the full SMS from your telecom.', 'error');

  const fund = Object.values(fundraisers).find(f => f.id === fundId);
  const id   = Date.now().toString();
  proofs[id] = {
    id, fundId, network: network.toUpperCase(),
    donorName: name, donorPhone: phone || '',
    proofText: proof, status: 'pending',
    submitted: Date.now(), slug: fund?.slug || ''
  };
  saveData();

  if (statusEl) {
    statusEl.classList.remove('hidden');
    statusEl.innerHTML = `<div class="bg-green-pale border border-green/30 rounded-xl p-4 text-center">
      <i class="fa-solid fa-circle-check text-green text-2xl mb-2"></i>
      <p class="font-bold text-green text-sm">Proof Submitted to Admin!</p>
      <p class="text-gray-500 text-xs mt-1">Admin will review and update the fundraiser raised amount within 24 hours. Thank you!</p>
    </div>`;
  }
  if (nameEl)  { nameEl.value = ''; nameEl.disabled = false; }
  if (phoneEl)  phoneEl.value = '';
  if (proofEl)  proofEl.value = '';
  const anonEl = document.getElementById(network + 'Anon');
  if (anonEl)  anonEl.checked = false;
  showToast(network.toUpperCase() + ' proof submitted ✓ Admin will verify shortly');
};

/* ── Stripe Donation Note ── */
window.submitStripeNote = function(fundId) {
  const recipient = document.getElementById('stripeRecipient')?.value.trim();
  const project   = document.getElementById('stripeProject')?.value.trim();
  const amount    = document.getElementById('stripeAmount')?.value.trim();
  const name      = document.getElementById('stripeDonorName')?.value.trim();
  const email     = document.getElementById('stripeDonorEmail')?.value.trim();
  const statusEl  = document.getElementById('stripeNoteStatus');
  const btn       = document.getElementById('stripeSubmitBtn');

  if (!recipient)                        return showToast('Enter the name of person you are donating to', 'error');
  if (!project)                          return showToast('Enter the fundraiser project name', 'error');
  if (!amount || isNaN(+amount) || +amount <= 0) return showToast('Enter the amount you are donating', 'error');
  if (!name)                             return showToast('Enter your full name (or check Anonymous)', 'error');

  const fund = Object.values(fundraisers).find(f => f.id === fundId);
  const id   = Date.now().toString();
  stripeNotes[id] = {
    id, fundId, recipient, project, amount: +amount,
    donorName: name, donorEmail: email || '',
    status: 'pending', submitted: Date.now(),
    slug: fund?.slug || ''
  };
  saveData();

  if (statusEl) {
    statusEl.classList.remove('hidden');
    statusEl.innerHTML = `<div class="bg-green-pale border border-green/30 rounded-xl p-4 text-center mb-3">
      <i class="fa-solid fa-circle-check text-green text-2xl mb-2"></i>
      <p class="font-bold text-green text-sm">Details Saved!</p>
      <p class="text-gray-500 text-xs mt-1">Now proceeding to Stripe. Complete your payment there.</p>
    </div>`;
  }
  if (btn) {
    btn.innerHTML = '<i class="fab fa-stripe mr-2"></i>Go to Stripe Payment Page';
    btn.className = btn.className.replace('bg-[#635BFF] hover:bg-indigo-700', 'bg-green hover:bg-green-light');
    btn.onclick = () => window.open(STRIPE_LINK, '_blank');
  }
  showToast('Details saved ✓ Redirecting to Stripe...');
  setTimeout(() => window.open(STRIPE_LINK, '_blank'), 900);
};

window.shareWA = function(link, title, name) {
  const msg = encodeURIComponent(`Please support ${name}'s fundraiser 🙏\n\n"${title}"\n\nDonate here: ${link}`);
  window.open('https://wa.me/?text=' + msg, '_blank');
};

                <i class="fa-solid fa-check mr-1"></i>Confirm
              </button>
            </div>
            <button onclick="rejectStripeNote('${s.id}')" class="w-full border border-red-200 text-red-500 font-semibold py-2 rounded-xl btn-press text-xs hover:bg-red-50 transition-colors">
              Reject / Mark Invalid
            </button>
          </div>` : s.amount ? `<p class="text-xs text-gray-500 mt-1"><i class="fa-solid fa-coins text-green mr-1"></i>Confirmed: <b>${fmtNum(s.amount)}</b></p>` : ''}
        </div>`;
      }).join('')
    : `<div class="bg-white rounded-2xl p-8 text-center border border-gray-100"><i class="fab fa-stripe text-gray-300 text-4xl mb-3"></i><p class="text-gray-400 text-sm">No Stripe donation notes yet</p></div>`;

  /* ── Fundraisers list ── */
  const fundsHTML = allFunds.map(f => {
    const owner  = users[f.userId];
    const raised = f.raised || 0;
    const pct    = f.target > 0 ? Math.min(100, Math.round(raised/f.target*100)) : 0;
    const pd     = f.payout;
    const payoutInfo = pd ? (pd.type==='Mobile'
      ? `${pd.provider}: ${pd.number} (${pd.names})`
      : `${pd.bankName} – ${pd.bankAccount} (${pd.bankHolder}${pd.bankSwift?' SWIFT:'+pd.bankSwift:''})`)
      : 'No payout info';
    return `
    <div class="bg-white rounded-2xl border border-gray-100 p-4 mb-3">
      <div class="flex items-start gap-3 mb-3">
        <img src="${f.media||DEFAULT_IMG}" alt="" class="w-16 h-16 rounded-xl object-cover shrink-0" loading="lazy">
        <div class="flex-1 min-w-0">
          <p class="font-bold text-sm text-gray-900 truncate">${f.title}</p>
          <p class="text-xs text-gray-400">${f.country} · ${f.currency} · ${ago(f.created)}</p>
          <p class="text-xs text-gray-400 mt-0.5">by ${owner?.name||'Unknown'}</p>
        </div>
      </div>
      <div class="w-full bg-gray-100 rounded-full h-2 mb-2">
        <div class="bg-gradient-to-r from-green to-green-light h-2 rounded-full" style="width:${pct}%"></div>
      </div>
      <div class="flex justify-between text-xs mb-3">
        <span class="text-green font-bold">${fmtNum(raised)} / ${fmtNum(f.target)} ${f.currency}</span>
        <span class="text-gray-400">${pct}%</span>
      </div>
      <div class="bg-gold-pale border border-gold/30 rounded-xl p-3 mb-3">
        <p class="text-xs font-semibold text-gray-700 mb-1"><i class="fa-solid fa-university text-gold mr-1"></i>Payout Info:</p>
        <p class="text-xs text-gray-600 font-mono break-all">${payoutInfo}</p>
      </div>
      <div class="flex gap-2 items-center">
        <input id="manualAmt_${f.id}" type="number" placeholder="Add amount (${f.currency})" inputmode="numeric" class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm transition-all">
        <button onclick="manualUpdateFund('${f.id}')" class="bg-green text-white font-bold px-3 py-2 rounded-xl btn-press text-xs whitespace-nowrap">
          Update Raised
        </button>
      </div>
    </div>`;
  }).join('') || `<div class="bg-white rounded-2xl p-6 text-center border border-gray-100"><p class="text-gray-400 text-sm">No fundraisers yet</p></div>`;

  document.getElementById('admin').innerHTML = `
  <div class="fade-in pt-4">
    <div class="bg-gradient-to-r from-green to-green-light rounded-2xl p-5 mb-6 text-white">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-white/60 text-xs uppercase tracking-widest">Admin Panel</p>
          <h2 class="font-black text-xl">${ADMIN_NAME}</h2>
        </div>
        <button onclick="logout()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-4 py-2 rounded-xl btn-press">Logout</button>
      </div>
      <div class="flex flex-wrap gap-2 mt-4 text-xs">
        <span class="bg-white/20 rounded-full px-3 py-1">MTN: ${MTN_NUMBER}</span>
        <span class="bg-white/20 rounded-full px-3 py-1">Airtel: ${AIRTEL_NUMBER}</span>
      </div>
    </div>

    ${statsHTML}

    <!-- TABS -->
    <div class="flex bg-white rounded-2xl p-1 shadow-sm border border-gray-100 mb-5 gap-1">
      <button id="adminTab_proofs" onclick="adminTab('proofs')"
        class="flex-1 py-2.5 rounded-xl text-xs font-bold bg-green text-white transition-all">
        MM Proofs
        ${pendingProofs.length > 0 ? `<span class="bg-white/30 text-white text-xs px-1.5 py-0.5 rounded-full ml-1">${pendingProofs.length}</span>` : ''}
      </button>
      <button id="adminTab_stripe" onclick="adminTab('stripe')"
        class="flex-1 py-2.5 rounded-xl text-xs font-bold text-gray-500 transition-all">
        Stripe
        ${pendingStripe.length > 0 ? `<span class="bg-indigo-100 text-indigo-700 text-xs px-1.5 py-0.5 rounded-full ml-1">${pendingStripe.length}</span>` : ''}
      </button>
      <button id="adminTab_funds" onclick="adminTab('funds')"
        class="flex-1 py-2.5 rounded-xl text-xs font-bold text-gray-500 transition-all">
        Fundraisers
      </button>
    </div>

    <div id="adminProofsSection">${proofsHTML}</div>
    <div id="adminStripeSection" class="hidden">${stripeHTML}</div>
    <div id="adminFundsSection" class="hidden">${fundsHTML}</div>
  </div>`;
};

function adminTab(tab) {
  const tabs = ['proofs', 'stripe', 'funds'];
  const secMap = { proofs:'adminProofsSection', stripe:'adminStripeSection', funds:'adminFundsSection' };
  tabs.forEach(t => {
    const btn = document.getElementById('adminTab_' + t);
    const sec = document.getElementById(secMap[t]);
    if (t === tab) {
      btn.className = 'flex-1 py-2.5 rounded-xl text-xs font-bold bg-green text-white transition-all';
      sec?.classList.remove('hidden');
    } else {
      btn.className = 'flex-1 py-2.5 rounded-xl text-xs font-bold text-gray-500 transition-all';
      sec?.classList.add('hidden');
    }
  });
}

window.approveProof = function(proofId) {
  const p     = proofs[proofId];
  if (!p) return;
  const amtEl = document.getElementById('amt_' + proofId);
  const amt   = parseFloat(amtEl?.value);
  if (!amt || amt <= 0) return showToast('Enter the confirmed donation amount first', 'error');
  p.status    = 'approved';
  p.amount    = amt;
  p.approvedAt = Date.now();
  const fund  = fundraisers[p.fundId];
  if (fund) fund.raised = (fund.raised||0) + amt;
  saveData();
  showToast('Proof approved ✓ Raised amount updated');
  showAdmin();
};

window.rejectProof = function(proofId) {
  if (!confirm('Reject this donation proof?')) return;
  proofs[proofId].status     = 'rejected';
  proofs[proofId].rejectedAt = Date.now();
  saveData();
  showToast('Proof rejected');
  showAdmin();
};

window.approveStripeNote = function(noteId) {
  const s     = stripeNotes[noteId];
  if (!s) return;
  const amtEl = document.getElementById('stripeAmt_' + noteId);
  const amt   = parseFloat(amtEl?.value);
  if (!amt || amt <= 0) return showToast('Enter the confirmed donation amount', 'error');
  s.status    = 'approved';
  s.amount    = amt;
  s.approvedAt = Date.now();
  const fund  = fundraisers[s.fundId];
  if (fund) fund.raised = (fund.raised||0) + amt;
  saveData();
  showToast('Stripe donation confirmed ✓ Raised amount updated');
  showAdmin();
};

window.rejectStripeNote = function(noteId) {
  if (!confirm('Mark this Stripe note as rejected/invalid?')) return;
  stripeNotes[noteId].status     = 'rejected';
  stripeNotes[noteId].rejectedAt = Date.now();
  saveData();
  showToast('Stripe note rejected');
  showAdmin();
};

window.manualUpdateFund = function(fundId) {
  const amtEl = document.getElementById('manualAmt_' + fundId);
  const amt   = parseFloat(amtEl?.value);
  if (!amt || amt <= 0) return showToast('Enter a valid amount', 'error');
  const fund  = fundraisers[fundId];
  if (!fund) return;
  fund.raised = (fund.raised||0) + amt;
  saveData();
  showToast('Fundraiser updated ✓');
  showAdmin();
};

/* ===================================================
   UTILITY
=================================================== */
window.copyLink = function(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied';
      btn.classList.add('copied-flash');
      setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied-flash'); }, 1500);
    }
    showToast('Copied to clipboard');
  }).catch(() => {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast('Copied!');
  });
};

let toastTimer = null;
function showToast(msg, type = 'success') {
  let toast = document.getElementById('ym_toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'ym_toast';
    toast.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;transition:all 0.3s ease;opacity:0;pointer-events:none;max-width:90vw;';
    document.body.appendChild(toast);
  }
  const bg = type === 'error' ? 'bg-red-500' : 'bg-gray-900';
  toast.innerHTML = `<div class="${bg} text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl text-center">${msg}</div>`;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.style.opacity = '0';
    toast.style.transform = 'translateX(-50%) translateY(20px)';
  }, 3000);
}
</script>
