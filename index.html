function fmtNum(n){ return Number(n||0).toLocaleString(); }
function ago(ts){
  const d=Date.now()-ts;
  if(d<60000)   return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000)return Math.floor(d/3600000)+'h ago';

}

/* build a phone-input widget */
function dialWidget(id, dialId, countries, defaultDial='+256'){
  const opts=countries.map(c=>`<option value="${c.dial}" ${c.dial===defaultDial?'selected':''}>${c.flag} ${c.dial}</option>`).join('');
  return `<div class="phone-wrap mb-3">
    <select id="${dialId}" class="dial-select">${opts}</select>
    <input  id="${id}" type="tel" inputmode="numeric" maxlength="9" placeholder="9-digit number" class="dial-input transition-all">
  </div>`;
}
function getPhone(dialId, inputId){
  const dial  = document.getElementById(dialId)?.value||'';
  const num   = document.getElementById(inputId)?.value.replace(/\D/g,'').slice(-9)||'';
  return dial+num;
}

/* toast */
let toastTimer=null;
function showToast(msg,type='success'){
  let t=document.getElementById('ym_toast');
  if(!t){ t=document.createElement('div'); t.id='ym_toast';
    t.style.cssText='position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);z-index:9999;transition:all 0.3s ease;opacity:0;pointer-events:none;max-width:90vw;';
    document.body.appendChild(t); }
  const bg=type==='error'?'bg-red-500':'bg-gray-900';
  t.innerHTML=`<div class="${bg} text-white text-sm font-semibold px-5 py-3 rounded-2xl shadow-2xl text-center">${msg}</div>`;
  t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(20px)'; },3000);
}

window.copyLink=function(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    if(btn){ const o=btn.textContent; btn.textContent='✓ Copied'; btn.classList.add('copied-flash');
      setTimeout(()=>{ btn.textContent=o; btn.classList.remove('copied-flash'); },1500); }
    showToast('Copied to clipboard');
  }).catch(()=>{
    const el=document.createElement('textarea'); el.value=text;
    document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
    showToast('Copied!');
  });
};

/* ══════════════════════════════════════════════
   FIREBASE DB HELPERS
══════════════════════════════════════════════ */
async function dbSet(path,data){ await set(ref(db,path),data); }
async function dbPush(path,data){ const r=push(ref(db,path)); await set(r,data); return r.key; }
async function dbUpdate(path,data){ await update(ref(db,path),data); }
async function dbRemove(path){ await remove(ref(db,path)); }
async function dbGet(path){
  const snap=await get(ref(db,path));
  return snap.exists()?snap.val():null;
}

/* load all data into cache */
async function loadAll(){
  const [u,f,p,s]=await Promise.all([
    dbGet('users'), dbGet('fundraisers'), dbGet('proofs'), dbGet('stripeNotes')
  ]);
  cache.users       = u||{};
  cache.fundraisers = f||{};
  cache.proofs      = p||{};
  cache.stripeNotes = s||{};
}

/* upload image to Firebase Storage */
async function uploadImage(file){
  const id=Date.now().toString();
  const compressed=await compressToBase64(file);
  if(!compressed||compressed===DEFAULT_IMG) return DEFAULT_IMG;
  // convert base64 to blob for Firebase Storage
  const res=await fetch(compressed);
  const blob=await res.blob();
  const storageRef=sRef(storage,`fundraiser-images/${id}.jpg`);
  await uploadBytes(storageRef,blob,{contentType:'image/jpeg'});
  const url=await getDownloadURL(storageRef);
  return url;
}

window.previewImage=async function(e){
  const file=e.target.files[0]; if(!file)return;
  const rd=new FileReader();
  rd.onload=ev=>{ const img=document.getElementById('previewImg'); img.src=ev.target.result; img.classList.remove('hidden'); };
  rd.readAsDataURL(file);
  const status=document.getElementById('uploadStatus');
  const btn   =document.getElementById('launchBtn');
  status.textContent='⏳ Uploading photo…';
  btn.disabled=true; btn.classList.add('opacity-60');
  isUploading=true;
  /* Set base64 immediately so the photo shows right away even before Firebase upload finishes */
  const base64Quick=await compressToBase64(file);
  if(base64Quick!==DEFAULT_IMG){ uploadedImgUrl=base64Quick; }
  try{
    const firebaseUrl=await uploadImage(file);
    if(firebaseUrl!==DEFAULT_IMG){ uploadedImgUrl=firebaseUrl; }
    status.textContent=uploadedImgUrl!==DEFAULT_IMG?'✅ Photo uploaded ✓':'⚠️ Upload failed – default image will be used';
  }catch(err){
    console.error(err);
    status.textContent=uploadedImgUrl!==DEFAULT_IMG?'✅ Photo ready ✓':'⚠️ Could not process photo';
  }
  isUploading=false;
  btn.disabled=false; btn.classList.remove('opacity-60');
};

function compressToBase64(file){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const MAX=900; let w=img.width,h=img.height;
        if(w>MAX||h>MAX){ if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;} }
        const canvas=document.createElement('canvas'); canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',0.78));
      };
      img.onerror=()=>resolve(DEFAULT_IMG);
      img.src=e.target.result;
    };
    reader.onerror=()=>resolve(DEFAULT_IMG);
    reader.readAsDataURL(file);
  });
}

window.toggleMethod=function(method){
  ['mtn','airtel','stripe'].forEach(m=>{
    const panel  =document.getElementById(m+'Method');
    const chevron=document.getElementById(m+'Chevron');
    if(m===method){
      const isOpen=!panel.classList.contains('hidden');
      if(isOpen){ panel.classList.add('hidden'); chevron?.classList.remove('open'); }
      else       { panel.classList.remove('hidden'); chevron?.classList.add('open'); }
    }else{
      panel?.classList.add('hidden'); chevron?.classList.remove('open');
    }
  });
};

/* Native Share API */
window.nativeShare=function(title,text,url){
  if(navigator.share){
    navigator.share({title,text,url}).catch(()=>{});
  }else{
    copyLink(url);
    showToast('Link copied — paste it anywhere to share');
  }
};

/* Stripe anonymous toggle */
window.toggleStripeAnon=function(){
  const isAnon=document.getElementById('stripeAnon')?.checked;
  const nameEl=document.getElementById('stripeDonorName');
  const emailEl=document.getElementById('stripeDonorEmail');
  if(!nameEl)return;
  if(isAnon){
    nameEl.value=''; nameEl.disabled=true; nameEl.placeholder='Not saved (anonymous)';
    if(emailEl){ emailEl.value=''; emailEl.disabled=true; emailEl.placeholder='Not saved (anonymous)'; }
  }else{
    nameEl.disabled=false; nameEl.placeholder='e.g. James Omondi';
    if(emailEl){ emailEl.disabled=false; emailEl.placeholder='your@email.com'; }
  }
};

window.toggleAnon=function(prefix){
  const isAnon=document.getElementById(prefix+'Anon')?.checked;
  const nameEl=prefix==='stripe'?document.getElementById('stripeDonorName'):document.getElementById(prefix+'DonorName');
  if(!nameEl)return;
  if(isAnon){ nameEl.value='Anonymous'; nameEl.disabled=true; }
  else      { if(nameEl.value==='Anonymous')nameEl.value=''; nameEl.disabled=false; }
};

window.submitMobileProof=async function(fundId,network){

  const proofEl =document.getElementById(network+'ProofText');

  const name    =nameEl?.value.trim();

  if(!proof)            return showToast('Please paste your telecom confirmation SMS','error');
  if(proof.length<20)   return showToast('Message too short. Paste the full SMS.','error');
  showLoader('Submitting proof…');
  const fund=Object.values(cache.fundraisers).find(f=>f.id===fundId);
  const key=await dbPush('proofs',{
    fundId,network:network.toUpperCase(),donorName:name,donorPhone:phone||'',
    proofText:proof,status:'pending',submitted:Date.now(),slug:fund?.slug||''
  });
  cache.proofs[key]={id:key,fundId,network:network.toUpperCase(),donorName:name,donorPhone:phone||'',proofText:proof,status:'pending',submitted:Date.now(),slug:fund?.slug||''};
  hideLoader();
  if(statusEl){
    statusEl.classList.remove('hidden');
    statusEl.innerHTML=`<div class="bg-green-pale border border-green/30 rounded-xl p-4 text-center">

/* ── Stripe Note ── */
window.submitStripeNote=async function(fundId){
  const recipient=document.getElementById('stripeRecipient')?.value.trim();
  const project  =document.getElementById('stripeProject')?.value.trim();
  const amount   =document.getElementById('stripeAmount')?.value.trim();
  const name     =document.getElementById('stripeDonorName')?.value.trim();
  const email    =document.getElementById('stripeDonorEmail')?.value.trim();
  const statusEl =document.getElementById('stripeNoteStatus');
  const btn      =document.getElementById('stripeSubmitBtn');
  if(!recipient)                          return showToast('Enter the name of person you are donating to','error');
  if(!project)                            return showToast('Enter the fundraiser project name','error');
  if(!amount||isNaN(+amount)||+amount<=0) return showToast('Enter the amount you are donating','error');
  const isAnon=document.getElementById('stripeAnon')?.checked;
  if(!isAnon&&!name)                        return showToast('Enter your full name or check Donate Anonymously','error');
  showLoader('Saving details…');
  const fund=Object.values(cache.fundraisers).find(f=>f.id===fundId);
  const savedName=isAnon?'':name;
  const key=await dbPush('stripeNotes',{
    fundId,recipient,project,amount:+amount,donorName:savedName,donorEmail:email||'',
    isAnonymous:isAnon?true:false,status:'pending',submitted:Date.now(),slug:fund?.slug||''
  });
  cache.stripeNotes[key]={id:key,fundId,recipient,project,amount:+amount,donorName:savedName,donorEmail:email||'',isAnonymous:isAnon?true:false,status:'pending',submitted:Date.now(),slug:fund?.slug||''};
  hideLoader();
  if(statusEl){
    statusEl.classList.remove('hidden');
    statusEl.innerHTML=`<div class="bg-green-pale border border-green/30 rounded-xl p-4 text-center mb-3">
      <i class="fa-solid fa-circle-check text-green text-2xl mb-2"></i>
      <p class="font-bold text-green text-sm">Details Saved!</p>
      <p class="text-gray-500 text-xs mt-1">Now proceeding to Stripe. Complete your payment there.</p>
    </div>`;
  }
  if(btn){
    btn.innerHTML='<i class="fab fa-stripe mr-2"></i>Go to Stripe Payment Page';
    btn.style.background='#0A4D2B';
    btn.onclick=()=>window.open(STRIPE_LINK,'_blank');
  }
  showToast('Details saved ✓ Redirecting to Stripe…');
  setTimeout(()=>window.open(STRIPE_LINK,'_blank'),900);
};

window.adminTab=function(tab){
  const map={proofs:'adminProofsSection',stripe:'adminStripeSection',funds:'adminFundsSection'};
  ['proofs','stripe','funds'].forEach(t=>{
    const btn=document.getElementById('adminTab_'+t);
    const sec=document.getElementById(map[t]);
    if(t===tab){ btn.className='flex-1 py-2.5 rounded-xl text-xs font-bold bg-green text-white transition-all'; sec?.classList.remove('hidden'); }
    else        { btn.className='flex-1 py-2.5 rounded-xl text-xs font-bold text-gray-500 transition-all';     sec?.classList.add('hidden'); }

};

window.approveProof=async function(proofId){
  const p=cache.proofs[proofId]; if(!p)return;
  const amt=parseFloat(document.getElementById('amt_'+proofId)?.value);
  if(!amt||amt<=0) return showToast('Enter the confirmed gross amount first','error');
  const fee=Math.round(amt*PLATFORM_PCT/100);
  const net=Math.round(amt*0.901);
  showLoader('Approving…');
  await dbUpdate(`proofs/${proofId}`,{status:'approved',amount:amt,fee,net,approvedAt:Date.now()});
  await dbUpdate(`fundraisers/${p.fundId}`,{raised:(cache.fundraisers[p.fundId]?.raised||0)+amt});
  await loadAll();
  hideLoader();
  showToast(`✓ Approved! Net payout: ${fmtNum(net)} (after ${PLATFORM_PCT}% transaction fee)`);
  showAdmin();
};

window.rejectProof=async function(proofId){
  if(!confirm('Reject this donation proof?'))return;
  showLoader();
  await dbUpdate(`proofs/${proofId}`,{status:'rejected',rejectedAt:Date.now()});
  await loadAll();
  hideLoader();
  showToast('Proof rejected');
  showAdmin();
};

window.adminDeleteFund=async function(fundId){
  const f=cache.fundraisers[fundId];
  if(!f) return;
  if(!confirm(`Delete "${f.title}"?\n\nThis will permanently remove the fundraiser and cannot be undone.`)) return;
  showLoader('Deleting…');
  await dbRemove(`fundraisers/${fundId}`);
  /* also remove related proofs & stripeNotes */
  const relatedProofs=Object.values(cache.proofs).filter(p=>p.fundId===fundId);
  const relatedStripe=Object.values(cache.stripeNotes).filter(s=>s.fundId===fundId);
  await Promise.all([
    ...relatedProofs.map(p=>dbRemove(`proofs/${p.id}`)),
    ...relatedStripe.map(s=>dbRemove(`stripeNotes/${s.id}`))
  ]);
  await loadAll();
  hideLoader();
  showToast('Fundraiser deleted ✓');
  showAdmin();
};

document.addEventListener('DOMContentLoaded', init);
