<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Action Uganda - Fundraising</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: 30px auto; padding: 20px; background: #f5f5f5; }
  .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    h1 { color: #2c7a2c; margin-top: 0; }
  .link-box { background: #e8f5e9; padding: 12px; border-radius: 6px; margin-top: 15px; word-break: break-all; }
  .btn { display: inline-block; margin-top: 15px; padding: 12px 20px; background: #2c7a2c; color: white; text-decoration: none; border-radius: 6px; border: none; cursor: pointer; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    label { font-weight: bold; }
  </style>
</head>
<body>

  <!-- This shows when someone opens a fundraising link -->
  <div class="card" id="viewer">
    <p id="topicTitle" style="color:#555; font-size:14px; text-transform:uppercase;"></p>
    <h1 id="title">Loading...</h1>
    <p id="details">Please wait</p>
    <div class="link-box">
      <strong>Fundraising Link:</strong><br>
      <span id="fundLink"></span>
    </div>
    <a href="#" class="btn" id="donateBtn">Support This Cause</a>
  </div>

  <!-- This is for fundraisers to create their own link -->
  <div class="card">
    <h2>Create Fundraising Link</h2>
    <label>What are you fundraising for? [Topic]</label>
    <input type="text" id="topicInput" placeholder="e.g. charity-for-babies">

    <label>Title</label>
    <input type="text" id="titleInput" placeholder="e.g. Charity for Babies in Uganda">

    <label>Details about your fundraising</label>
    <textarea id="detailsInput" rows="4" placeholder="Explain what the funds will be used for..."></textarea>

    <label>ID Number</label>
    <input type="number" id="idInput" placeholder="e.g. 3451">

    <button class="btn" onclick="generateLink()">Generate Link</button>

    <div id="output" style="margin-top:15px;"></div>
  </div>

<script>
const BASE_URL = "https://socialaction80-yamba-muno.github.io/Uganda/";

// When page loads, check if?f= exists
function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  const f = params.get('f'); // e.g. "charity-for-babies--3451"

  if(f) {
    const parts = f.split('--');
    const topic = parts[0];
    const id = parts[1];

    // We can't get title/details from URL alone.
    // So we show what we have and tell user to save details elsewhere or use a database.
    document.getElementById('topicTitle').innerText = topic.replace(/-/g, ' ');
    document.getElementById('title').innerText = "Fundraiser: " + topic.replace(/-/g, ' ');
    document.getElementById('details').innerText = "This fundraiser is for: " + topic.replace(/-/g, ' ') + ". ID: " + id + ". Contact the organizer for full details.";
    document.getElementById('fundLink').innerText = BASE_URL + '?f=' + f;
    document.getElementById('donateBtn').href = BASE_URL + '?f=' + f;
  } else {
    document.getElementById('viewer').style.display = 'none'; // hide if no link
  }
}

// Fundraiser types their own info and we generate the link
function generateLink() {
  const topic = document.getElementById('topicInput').value.trim().toLowerCase().replace(/ /g, '-');
  const title = document.getElementById('titleInput').value.trim();
  const details = document.getElementById('detailsInput').value.trim();
  const id = document.getElementById('idInput').value.trim();

  if(!topic ||!title ||!details ||!id) {
    alert("Please fill all fields");
    return;
  }

  const link = `${BASE_URL}?f=${topic}--${id}`;

  document.getElementById('output').innerHTML = `
    <div class="link-box">
      <strong>Your Fundraising Link:</strong><br>
      <a href="${link}" target="_blank">${link}</a>
    </div>
    <p><b>Title:</b> ${title}</p>
    <p><b>Details:</b> ${details}</p>
    <p style="font-size:12px; color:#666;">Note: You need to host these details somewhere. This link format is:?f=topic--ID</p>
  `;
}

loadFromURL();
</script>

</body>
</html>
